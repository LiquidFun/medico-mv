<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Chat Application</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 1200px;
            height: 90vh;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            display: flex;
            overflow: hidden;
        }

        .sidebar {
            width: 300px;
            background: #f7f9fc;
            border-right: 1px solid #e1e4e8;
            display: flex;
            flex-direction: column;
        }

        .sidebar-header {
            padding: 20px;
            border-bottom: 1px solid #e1e4e8;
        }

        .sidebar-header h2 {
            font-size: 20px;
            color: #24292e;
            margin-bottom: 15px;
        }

        .new-chat-btn {
            width: 100%;
            padding: 12px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: background 0.3s;
        }

        .new-chat-btn:hover {
            background: #5568d3;
        }

        .conversations-list {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
        }

        .conversation-item {
            padding: 12px;
            margin-bottom: 5px;
            background: white;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
            border: 2px solid transparent;
        }

        .conversation-item:hover {
            background: #e8eaf6;
        }

        .conversation-item.active {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }

        .conversation-title {
            font-weight: 500;
            font-size: 14px;
            margin-bottom: 4px;
        }

        .conversation-date {
            font-size: 12px;
            opacity: 0.7;
        }

        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .chat-header {
            padding: 20px;
            border-bottom: 1px solid #e1e4e8;
            background: white;
        }

        .chat-header h1 {
            font-size: 24px;
            color: #24292e;
        }

        .user-info {
            font-size: 14px;
            color: #586069;
            margin-top: 5px;
        }

        .logout-btn {
            padding: 8px 16px;
            background: #dc3545;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            margin-top: 10px;
        }

        .logout-btn:hover {
            background: #c82333;
        }

        .messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            background: #fafbfc;
        }

        .message {
            margin-bottom: 20px;
            display: flex;
            gap: 12px;
        }

        .message.user {
            flex-direction: row-reverse;
        }

        .message-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: white;
            flex-shrink: 0;
        }

        .message.user .message-avatar {
            background: #667eea;
        }

        .message.assistant .message-avatar {
            background: #28a745;
        }

        .message-content {
            max-width: 70%;
            padding: 12px 16px;
            border-radius: 12px;
            line-height: 1.6;
        }

        .message.user .message-content {
            background: #667eea;
            color: white;
        }

        .message.assistant .message-content {
            background: white;
            color: #24292e;
            border: 1px solid #e1e4e8;
        }

        .message-content h1, .message-content h2, .message-content h3 {
            margin-top: 16px;
            margin-bottom: 8px;
        }

        .message-content h1:first-child,
        .message-content h2:first-child,
        .message-content h3:first-child {
            margin-top: 0;
        }

        .message-content p {
            margin-bottom: 12px;
        }

        .message-content p:last-child {
            margin-bottom: 0;
        }

        .message-content ul, .message-content ol {
            margin-left: 20px;
            margin-bottom: 12px;
        }

        .message-content code {
            background: rgba(0, 0, 0, 0.05);
            padding: 2px 6px;
            border-radius: 4px;
            font-family: 'Monaco', 'Courier New', monospace;
            font-size: 0.9em;
        }

        .message.user .message-content code {
            background: rgba(255, 255, 255, 0.2);
        }

        .message-content pre {
            background: #f6f8fa;
            padding: 12px;
            border-radius: 6px;
            overflow-x: auto;
            margin-bottom: 12px;
        }

        .message-content pre code {
            background: transparent;
            padding: 0;
        }

        .message-content blockquote {
            border-left: 4px solid #dfe2e5;
            padding-left: 12px;
            margin-left: 0;
            margin-bottom: 12px;
            color: #6a737d;
        }

        .input-container {
            padding: 20px;
            background: white;
            border-top: 1px solid #e1e4e8;
        }

        .input-form {
            display: flex;
            gap: 10px;
        }

        .message-input {
            flex: 1;
            padding: 12px 16px;
            border: 2px solid #e1e4e8;
            border-radius: 24px;
            font-size: 14px;
            outline: none;
            transition: border-color 0.3s;
        }

        .message-input:focus {
            border-color: #667eea;
        }

        .send-btn {
            padding: 12px 24px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 24px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: background 0.3s;
        }

        .send-btn:hover {
            background: #5568d3;
        }

        .send-btn:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        .auth-container {
            max-width: 400px;
            width: 100%;
            padding: 40px;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }

        .auth-container h1 {
            margin-bottom: 30px;
            color: #24292e;
            text-align: center;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #24292e;
            font-weight: 500;
        }

        .form-group input {
            width: 100%;
            padding: 12px;
            border: 2px solid #e1e4e8;
            border-radius: 8px;
            font-size: 14px;
            outline: none;
            transition: border-color 0.3s;
        }

        .form-group input:focus {
            border-color: #667eea;
        }

        .auth-btn {
            width: 100%;
            padding: 14px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 500;
            transition: background 0.3s;
        }

        .auth-btn:hover {
            background: #5568d3;
        }

        .auth-switch {
            text-align: center;
            margin-top: 20px;
            color: #586069;
        }

        .auth-switch a {
            color: #667eea;
            text-decoration: none;
            font-weight: 500;
        }

        .auth-switch a:hover {
            text-decoration: underline;
        }

        .error-message {
            background: #dc3545;
            color: white;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            text-align: center;
        }

        .hidden {
            display: none !important;
        }

        .typing-indicator {
            display: inline-block;
            padding: 8px 12px;
        }

        .typing-indicator span {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #667eea;
            margin: 0 2px;
            animation: bounce 1.4s infinite ease-in-out both;
        }

        .typing-indicator span:nth-child(1) {
            animation-delay: -0.32s;
        }

        .typing-indicator span:nth-child(2) {
            animation-delay: -0.16s;
        }

        @keyframes bounce {
            0%, 80%, 100% {
                transform: scale(0);
            }
            40% {
                transform: scale(1);
            }
        }
    </style>
</head>
<body>
    <!-- Auth Screen -->
    <div id="authScreen" class="auth-container">
        <h1 id="authTitle">Login</h1>
        <div id="authError" class="error-message hidden"></div>

        <form id="authForm">
            <div class="form-group hidden" id="emailGroup">
                <label for="email">Email</label>
                <input type="email" id="email" required>
            </div>

            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" required>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" required>
            </div>

            <button type="submit" class="auth-btn" id="authSubmitBtn">Login</button>
        </form>

        <div class="auth-switch">
            <span id="authSwitchText">Don't have an account?</span>
            <a href="#" id="authSwitchLink">Register</a>
        </div>
    </div>

    <!-- Chat Screen -->
    <div id="chatScreen" class="container hidden">
        <div class="sidebar">
            <div class="sidebar-header">
                <h2>Conversations</h2>
                <button class="new-chat-btn" id="newChatBtn">+ New Chat</button>
            </div>
            <div class="conversations-list" id="conversationsList"></div>
        </div>

        <div class="main-content">
            <div class="chat-header">
                <h1>AI Chat</h1>
                <div class="user-info" id="userInfo"></div>
                <button class="logout-btn" id="logoutBtn">Logout</button>
            </div>

            <div class="messages-container" id="messagesContainer">
                <div class="message assistant">
                    <div class="message-avatar">AI</div>
                    <div class="message-content">
                        <p>Hello! I'm your AI assistant. How can I help you today?</p>
                    </div>
                </div>
            </div>

            <div class="input-container">
                <form class="input-form" id="messageForm">
                    <input
                        type="text"
                        class="message-input"
                        id="messageInput"
                        placeholder="Type your message..."
                        autocomplete="off"
                    >
                    <button type="submit" class="send-btn" id="sendBtn">Send</button>
                </form>
            </div>
        </div>
    </div>

    <script>
        // State management
        let state = {
            token: localStorage.getItem('token') || null,
            user: JSON.parse(localStorage.getItem('user') || 'null'),
            currentConversationId: null,
            ws: null,
            isAuthMode: 'login'
        };

        // DOM elements
        const authScreen = document.getElementById('authScreen');
        const chatScreen = document.getElementById('chatScreen');
        const authForm = document.getElementById('authForm');
        const authError = document.getElementById('authError');
        const authTitle = document.getElementById('authTitle');
        const authSubmitBtn = document.getElementById('authSubmitBtn');
        const authSwitchText = document.getElementById('authSwitchText');
        const authSwitchLink = document.getElementById('authSwitchLink');
        const emailGroup = document.getElementById('emailGroup');
        const messageForm = document.getElementById('messageForm');
        const messageInput = document.getElementById('messageInput');
        const messagesContainer = document.getElementById('messagesContainer');
        const conversationsList = document.getElementById('conversationsList');
        const newChatBtn = document.getElementById('newChatBtn');
        const logoutBtn = document.getElementById('logoutBtn');
        const userInfo = document.getElementById('userInfo');
        const sendBtn = document.getElementById('sendBtn');

        // Utility functions
        function showError(message) {
            authError.textContent = message;
            authError.classList.remove('hidden');
            setTimeout(() => authError.classList.add('hidden'), 5000);
        }

        function formatDate(dateString) {
            const date = new Date(dateString);
            const now = new Date();
            const diff = now - date;
            const days = Math.floor(diff / (1000 * 60 * 60 * 24));

            if (days === 0) return 'Today';
            if (days === 1) return 'Yesterday';
            if (days < 7) return `${days} days ago`;
            return date.toLocaleDateString();
        }

        function renderToolCall(contentDiv, toolName, toolArgs) {
            console.log('DEBUG: renderToolCall called with:', { toolName, toolArgs: toolArgs.substring(0, 100) });

            // Re-execute the tool to get the HTML
            if (toolName === 'create_plot') {
                // Parse the arguments and regenerate the plot
                try {
                    const args = JSON.parse(toolArgs);
                    console.log('DEBUG: Parsed tool args:', args);

                    // Make a request to regenerate the plot HTML
                    fetch('/api/tools/execute', {
                        method: 'POST',
                        headers: {
                            'Authorization': `Bearer ${state.token}`,
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({
                            tool_name: toolName,
                            arguments: args
                        })
                    })
                    .then(r => {
                        console.log('DEBUG: Tool execute response status:', r.status);
                        if (!r.ok) {
                            throw new Error(`HTTP ${r.status}: ${r.statusText}`);
                        }
                        return r.json();
                    })
                    .then(result => {
                        console.log('DEBUG: Tool execute result:', result);

                        if (!result.html) {
                            console.error('No HTML in result:', result);
                            return;
                        }

                        // Create a tool result div
                        const plotDiv = document.createElement('div');
                        plotDiv.setAttribute('data-tool-result', 'true');

                        // Parse HTML and extract scripts
                        const tempContainer = document.createElement('div');
                        tempContainer.innerHTML = result.html;

                        const scripts = tempContainer.querySelectorAll('script');
                        const scriptContents = [];
                        scripts.forEach(script => {
                            if (script.src) {
                                const newScript = document.createElement('script');
                                newScript.src = script.src;
                                scriptContents.push(newScript);
                            } else {
                                scriptContents.push(script.textContent);
                            }
                            script.remove();
                        });

                        plotDiv.innerHTML = tempContainer.innerHTML;
                        contentDiv.appendChild(plotDiv);

                        // Execute scripts
                        scriptContents.forEach(scriptContent => {
                            if (typeof scriptContent === 'string') {
                                try {
                                    eval(scriptContent);
                                } catch (e) {
                                    console.error('Error executing script:', e);
                                }
                            } else {
                                plotDiv.appendChild(scriptContent);
                            }
                        });

                        console.log('DEBUG: Plot rendered successfully');
                    })
                    .catch(e => {
                        console.error('Error rendering tool call:', e);
                        contentDiv.innerHTML += `<p style="color: red;">Error loading plot: ${e.message}</p>`;
                    });
                } catch (e) {
                    console.error('Error parsing tool args:', e);
                    contentDiv.innerHTML += `<p style="color: red;">Error parsing tool data: ${e.message}</p>`;
                }
            }
        }

        function addMessage(role, content, isStreaming = false) {
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${role}`;

            const avatar = document.createElement('div');
            avatar.className = 'message-avatar';
            avatar.textContent = role === 'user' ? 'U' : 'AI';

            const contentDiv = document.createElement('div');
            contentDiv.className = 'message-content';

            if (isStreaming) {
                contentDiv.innerHTML = '';
                contentDiv.dataset.markdown = '';
            } else {
                if (role === 'user') {
                    contentDiv.textContent = content;
                } else {
                    // Check if content contains tool calls
                    console.log('DEBUG: Checking content for tool calls:', content.substring(0, 200));
                    const toolCallRegex = /\[Tool: ([^\]]+)\]\n({[\s\S]+?)(?=\n\n|\n\[Tool:|$)/g;
                    let lastIndex = 0;
                    let hasToolCalls = false;

                    // First, render any markdown content before tool calls
                    let match;
                    const parts = [];

                    while ((match = toolCallRegex.exec(content)) !== null) {
                        hasToolCalls = true;
                        console.log('DEBUG: Found tool call match:', match);
                        // Add text before this tool call
                        if (match.index > lastIndex) {
                            const textBefore = content.substring(lastIndex, match.index);
                            if (textBefore.trim()) {
                                parts.push({ type: 'text', content: textBefore });
                            }
                        }
                        // Add tool call
                        parts.push({
                            type: 'tool',
                            name: match[1],
                            args: match[2]
                        });
                        lastIndex = match.index + match[0].length;
                    }

                    console.log('DEBUG: hasToolCalls:', hasToolCalls, 'parts:', parts.length);

                    // Add remaining text after last tool call
                    if (lastIndex < content.length) {
                        const textAfter = content.substring(lastIndex);
                        if (textAfter.trim()) {
                            parts.push({ type: 'text', content: textAfter });
                        }
                    }

                    if (hasToolCalls) {
                        // Render parts in order
                        parts.forEach(part => {
                            if (part.type === 'text') {
                                const textDiv = document.createElement('div');
                                textDiv.innerHTML = marked.parse(part.content);
                                contentDiv.appendChild(textDiv);
                            } else if (part.type === 'tool') {
                                renderToolCall(contentDiv, part.name, part.args);
                            }
                        });
                    } else {
                        // No tool calls, just render markdown
                        contentDiv.innerHTML = marked.parse(content);
                    }
                }
            }

            messageDiv.appendChild(avatar);
            messageDiv.appendChild(contentDiv);
            messagesContainer.appendChild(messageDiv);
            messagesContainer.scrollTop = messagesContainer.scrollHeight;

            return contentDiv;
        }

        function addTypingIndicator() {
            const messageDiv = document.createElement('div');
            messageDiv.className = 'message assistant';
            messageDiv.id = 'typingIndicator';

            const avatar = document.createElement('div');
            avatar.className = 'message-avatar';
            avatar.textContent = 'AI';

            const indicator = document.createElement('div');
            indicator.className = 'typing-indicator';
            indicator.innerHTML = '<span></span><span></span><span></span>';

            messageDiv.appendChild(avatar);
            messageDiv.appendChild(indicator);
            messagesContainer.appendChild(messageDiv);
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
        }

        function removeTypingIndicator() {
            const indicator = document.getElementById('typingIndicator');
            if (indicator) indicator.remove();
        }

        // Auth functions
        authSwitchLink.addEventListener('click', (e) => {
            e.preventDefault();
            state.isAuthMode = state.isAuthMode === 'login' ? 'register' : 'login';

            if (state.isAuthMode === 'login') {
                authTitle.textContent = 'Login';
                authSubmitBtn.textContent = 'Login';
                authSwitchText.textContent = "Don't have an account?";
                authSwitchLink.textContent = 'Register';
                emailGroup.classList.add('hidden');
            } else {
                authTitle.textContent = 'Register';
                authSubmitBtn.textContent = 'Register';
                authSwitchText.textContent = 'Already have an account?';
                authSwitchLink.textContent = 'Login';
                emailGroup.classList.remove('hidden');
            }
        });

        authForm.addEventListener('submit', async (e) => {
            e.preventDefault();

            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const email = document.getElementById('email').value;

            try {
                let response;

                if (state.isAuthMode === 'login') {
                    const formData = new FormData();
                    formData.append('username', username);
                    formData.append('password', password);

                    response = await fetch('/api/auth/login', {
                        method: 'POST',
                        body: formData
                    });
                } else {
                    response = await fetch('/api/auth/register', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({ username, email, password })
                    });
                }

                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.detail || 'Authentication failed');
                }

                state.token = data.access_token;
                state.user = data.user;
                localStorage.setItem('token', state.token);
                localStorage.setItem('user', JSON.stringify(state.user));

                showChatScreen();
                loadConversations();
            } catch (error) {
                showError(error.message);
            }
        });

        logoutBtn.addEventListener('click', () => {
            state.token = null;
            state.user = null;
            state.currentConversationId = null;
            localStorage.removeItem('token');
            localStorage.removeItem('user');

            if (state.ws) {
                state.ws.close();
                state.ws = null;
            }

            authScreen.classList.remove('hidden');
            chatScreen.classList.add('hidden');
        });

        function showChatScreen() {
            authScreen.classList.add('hidden');
            chatScreen.classList.remove('hidden');
            userInfo.textContent = `Logged in as ${state.user.username}`;
        }

        // Chat functions
        async function loadConversations() {
            try {
                const response = await fetch('/api/chat/conversations', {
                    headers: {
                        'Authorization': `Bearer ${state.token}`
                    }
                });

                if (!response.ok) throw new Error('Failed to load conversations');

                const conversations = await response.json();
                conversationsList.innerHTML = '';

                conversations.forEach(conv => {
                    const item = document.createElement('div');
                    item.className = 'conversation-item';
                    if (conv.id === state.currentConversationId) {
                        item.classList.add('active');
                    }

                    item.innerHTML = `
                        <div class="conversation-title">${conv.title}</div>
                        <div class="conversation-date">${formatDate(conv.updated_at)}</div>
                    `;

                    item.addEventListener('click', () => loadConversation(conv.id));
                    conversationsList.appendChild(item);
                });
            } catch (error) {
                console.error('Error loading conversations:', error);
            }
        }

        async function loadConversation(conversationId) {
            try {
                const response = await fetch(`/api/chat/conversations/${conversationId}`, {
                    headers: {
                        'Authorization': `Bearer ${state.token}`
                    }
                });

                if (!response.ok) throw new Error('Failed to load conversation');

                const conversation = await response.json();
                state.currentConversationId = conversationId;

                // Clear messages
                messagesContainer.innerHTML = '';

                // Add messages
                conversation.messages.forEach(msg => {
                    addMessage(msg.role, msg.content);
                });

                // Update active conversation highlighting
                loadConversations();

                // Connect WebSocket
                connectWebSocket(conversationId);
            } catch (error) {
                console.error('Error loading conversation:', error);
            }
        }

        newChatBtn.addEventListener('click', async () => {
            try {
                const response = await fetch('/api/chat/conversations', {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${state.token}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ title: 'New Conversation' })
                });

                if (!response.ok) throw new Error('Failed to create conversation');

                const conversation = await response.json();
                state.currentConversationId = conversation.id;

                messagesContainer.innerHTML = '';
                addMessage('assistant', 'Hello! I\'m your AI assistant. How can I help you today?');

                loadConversations();
                connectWebSocket(conversation.id);
            } catch (error) {
                console.error('Error creating conversation:', error);
            }
        });

        function connectWebSocket(conversationId) {
            if (state.ws) {
                state.ws.close();
            }

            const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
            const wsUrl = `${protocol}//${window.location.host}/ws/chat/${conversationId}?token=${state.token}`;

            state.ws = new WebSocket(wsUrl);

            state.ws.onopen = () => {
                console.log('WebSocket connected');
                sendBtn.disabled = false;
            };

            let currentMessageDiv = null;
            let currentContent = '';

            state.ws.onmessage = (event) => {
                const data = JSON.parse(event.data);
                console.log('DEBUG WS: Received message:', data);

                if (data.error) {
                    console.error('WebSocket error:', data.error);
                    removeTypingIndicator();
                    return;
                }

                if (data.type === 'start') {
                    console.log('DEBUG WS: Starting new message');
                    removeTypingIndicator();
                    currentMessageDiv = addMessage('assistant', '', true);
                    currentContent = '';
                } else if (data.type === 'chunk') {
                    console.log('DEBUG WS: Got content chunk:', data.content.substring(0, 50));
                    currentContent += data.content;
                    // Save any existing tool results
                    const toolResults = Array.from(currentMessageDiv.querySelectorAll('[data-tool-result]'));
                    console.log('DEBUG WS: Existing tool results:', toolResults.length);
                    // Render markdown content
                    const tempDiv = document.createElement('div');
                    tempDiv.innerHTML = marked.parse(currentContent);
                    // Clear and rebuild: first add markdown content
                    currentMessageDiv.innerHTML = '';
                    while (tempDiv.firstChild) {
                        currentMessageDiv.appendChild(tempDiv.firstChild);
                    }
                    // Then re-append tool results
                    toolResults.forEach(tr => currentMessageDiv.appendChild(tr));
                    messagesContainer.scrollTop = messagesContainer.scrollHeight;
                } else if (data.type === 'tool_result') {
                    console.log('DEBUG WS: Got tool result for tool:', data.tool_name);
                    console.log('DEBUG WS: Tool result HTML length:', data.html.length);

                    // Inject HTML plot directly into the message
                    const plotDiv = document.createElement('div');
                    plotDiv.setAttribute('data-tool-result', 'true');

                    // Parse the HTML to extract and execute scripts separately
                    const tempContainer = document.createElement('div');
                    tempContainer.innerHTML = data.html;

                    // Extract all script elements
                    const scripts = tempContainer.querySelectorAll('script');
                    const scriptContents = [];
                    scripts.forEach(script => {
                        if (script.src) {
                            // External script - keep as is
                            const newScript = document.createElement('script');
                            newScript.src = script.src;
                            scriptContents.push(newScript);
                        } else {
                            // Inline script - save the code to execute later
                            scriptContents.push(script.textContent);
                        }
                        script.remove(); // Remove from temp container
                    });

                    // Add the HTML (without scripts) to the plot div
                    plotDiv.innerHTML = tempContainer.innerHTML;

                    console.log('DEBUG WS: Appending plot div to message');
                    currentMessageDiv.appendChild(plotDiv);

                    // Now execute the scripts in order
                    scriptContents.forEach(scriptContent => {
                        if (typeof scriptContent === 'string') {
                            // Inline script - execute it
                            console.log('DEBUG WS: Executing inline script');
                            try {
                                eval(scriptContent);
                            } catch (e) {
                                console.error('Error executing script:', e);
                            }
                        } else {
                            // External script element - append it
                            console.log('DEBUG WS: Loading external script:', scriptContent.src);
                            plotDiv.appendChild(scriptContent);
                        }
                    });

                    console.log('DEBUG WS: Message div now has', currentMessageDiv.children.length, 'children');
                    messagesContainer.scrollTop = messagesContainer.scrollHeight;
                } else if (data.type === 'end') {
                    console.log('DEBUG WS: Message ended');
                    // Final rendering - preserve tool results
                    const toolResults = Array.from(currentMessageDiv.querySelectorAll('[data-tool-result]'));
                    console.log('DEBUG WS: Final tool results count:', toolResults.length);
                    console.log('DEBUG WS: Final content length:', currentContent.length);
                    if (currentContent.trim()) {
                        console.log('DEBUG WS: Rendering final markdown');
                        const tempDiv = document.createElement('div');
                        tempDiv.innerHTML = marked.parse(currentContent);
                        currentMessageDiv.innerHTML = '';
                        while (tempDiv.firstChild) {
                            currentMessageDiv.appendChild(tempDiv.firstChild);
                        }
                        // Re-append tool results after markdown content
                        toolResults.forEach(tr => currentMessageDiv.appendChild(tr));
                    } else {
                        console.log('DEBUG WS: No content to render, keeping tool results only');
                    }
                    console.log('DEBUG WS: Final message div has', currentMessageDiv.children.length, 'children');
                    messagesContainer.scrollTop = messagesContainer.scrollHeight;
                    loadConversations(); // Refresh conversation list
                }
            };

            state.ws.onerror = (error) => {
                console.error('WebSocket error:', error);
                sendBtn.disabled = true;
            };

            state.ws.onclose = () => {
                console.log('WebSocket disconnected');
                sendBtn.disabled = true;
            };
        }

        messageForm.addEventListener('submit', (e) => {
            e.preventDefault();

            const message = messageInput.value.trim();
            if (!message || !state.ws || state.ws.readyState !== WebSocket.OPEN) {
                return;
            }

            addMessage('user', message);
            addTypingIndicator();

            state.ws.send(JSON.stringify({ message }));
            messageInput.value = '';
        });

        // Initialize
        if (state.token && state.user) {
            showChatScreen();
            loadConversations();
            // Auto-create or load first conversation
            setTimeout(() => {
                if (!state.currentConversationId) {
                    newChatBtn.click();
                }
            }, 500);
        }
    </script>
</body>
</html>
